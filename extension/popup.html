<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1e293b;
      background: #fff;
    }
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 24px; height: 24px;
      background: #2563eb;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .title { font-weight: 600; font-size: 14px; }
    .body { padding: 14px 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 12px;
      font-family: monospace;
      color: #1e293b;
      outline: none;
    }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 2px #bfdbfe; }
    .hint { margin-top: 5px; font-size: 11px; color: #94a3b8; }
    .save-btn {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .save-btn:hover { background: #1d4ed8; }
    .saved-msg {
      display: none;
      margin-top: 8px;
      text-align: center;
      font-size: 12px;
      color: #16a34a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">K</div>
    <span class="title">Knox CRM</span>
  </div>
  <div class="body">
    <label for="crmUrl">CRM Server URL</label>
    <input type="url" id="crmUrl" placeholder="http://localhost:3001" />
    <p class="hint">Leave as localhost for local dev, or paste your Railway URL.</p>
    <button class="save-btn" id="saveBtn">Save</button>
    <p class="saved-msg" id="savedMsg">✓ Saved</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
